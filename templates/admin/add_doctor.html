{% extends "admin/base.html" %}
{% block title %}Add Doctor — Admin{% endblock %}
{% block content %}
<div class="page-header">
  <h1>➕ Add Doctor</h1>
  <a href="/admin/doctors" class="btn btn-secondary">
    <i data-lucide="arrow-left"></i> Back to List
  </a>
</div>

<div class="card" style="max-width: 680px; margin: 0 auto;">
  <div style="margin-bottom: 1.5rem;">
    <h2 style="font-size: 1.2rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem;">Doctor Profile Information</h2>
    <p style="font-size: 0.82rem; color: var(--text-muted);">Fill in all fields marked with * to register a new medical practitioner.</p>
  </div>
  
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" class="form-control" required placeholder="Dr. Ramesh Iyer"/>
      </div>
      <div class="form-group">
        <label>Specialization *</label>
        <input type="text" name="specialization" class="form-control" required placeholder="e.g. Cardiologist"/>
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Department *</label>
        <select name="dept_id" required>
          <option value="">Select Department</option>
          {% for d in depts %}
            <option value="{{ d.dept_id }}">{{ d.dept_name }} ({{ d.location }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Available Days</label>
        <input type="text" name="available_days" class="form-control" placeholder="e.g. Mon-Fri" value="Mon-Fri"/>
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" class="form-control" placeholder="e.g. 9876543210"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="e.g. ramesh@hospital.com"/>
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>License Number *</label>
        <input type="text" name="license_number" class="form-control" required placeholder="e.g. MC-98765"/>
      </div>
      <div class="form-group">
        <label>Password (Default: doctor123)</label>
        <input type="text" name="password" class="form-control" placeholder="doctor123"/>
      </div>
    </div>
    
    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
      <i data-lucide="shield-check"></i> Register Doctor
    </button>
  </form>
</div>
{% endblock %}
